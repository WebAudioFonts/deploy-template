name: Deploy WebAudioFonts

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Convert SF2 files
        run: |
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./presets

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5